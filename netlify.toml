[build]
  command   = "node generate-config.js"
  publish   = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS y CSS cacheados por 1 año (Netlify genera hashes automáticamente)
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# firebase-config.js NUNCA cacheado — se regenera en cada deploy
[[headers]]
  for = "/assets/js/firebase-config.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
